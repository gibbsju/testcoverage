<title>Firefox CI: Suite x Worker-Type Matrix</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    color: #ccc;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 13px;
    padding: 20px;
  }
  h1 {
    color: white;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .subtitle {
    color: #888;
    font-size: 13px;
    margin-bottom: 20px;
  }
  .os-legend {
    display: flex;
    gap: 24px;
    margin-bottom: 16px;
    font-size: 13px;
  }
  .os-legend span {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot-legend {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
  }
  .table-wrapper {
    overflow-x: auto;
    max-width: 100%;
  }
  table {
    border-collapse: collapse;
    white-space: nowrap;
  }
  th, td {
    padding: 3px 6px;
    text-align: center;
    border: 1px solid #2a2a4a;
  }
  th {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #16213e;
  }
  th.suite-header {
    text-align: left;
    font-weight: normal;
    min-width: 280px;
    position: sticky;
    left: 0;
    z-index: 20;
    background: #16213e;
  }
  th.count-header {
    position: sticky;
    right: 0;
    z-index: 20;
    background: #16213e;
    color: #aaa;
    min-width: 30px;
  }
  th.wt-header {
    writing-mode: vertical-lr;
    text-orientation: mixed;
    transform: rotate(180deg);
    font-weight: normal;
    font-size: 11px;
    padding: 8px 4px;
    height: 180px;
    vertical-align: bottom;
  }
  th.os-group-header {
    font-weight: bold;
    font-size: 14px;
    border-bottom: 2px solid;
    padding: 6px 4px;
  }
  td.suite-name {
    text-align: left;
    position: sticky;
    left: 0;
    background: inherit;
    z-index: 5;
    font-size: 12px;
  }
  td.count-cell {
    position: sticky;
    right: 0;
    background: inherit;
    z-index: 5;
    color: #aaa;
    font-size: 11px;
  }
  tr:nth-child(even) { background: #1e2a4a; }
  tr:nth-child(odd) { background: #16213e; }
  tr:hover { background: #2a3a5a !important; }
  tr.section-header td {
    background: #0d1525 !important;
    font-weight: bold;
    font-size: 13px;
    color: #ddd;
    padding: 8px 6px;
    text-align: left;
    border-top: 2px solid #444;
  }
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: inline-block;
  }
  .empty {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: inline-block;
    background: #2a2a3a;
  }
  .linux { background: #4A90D9; }
  .windows { background: #7B68EE; }
  .macos { background: #E88D39; }
  .android { background: #50C878; }

  .risk-high { color: #E74C3C; font-weight: bold; }
  .risk-med { color: #F39C12; }
  .risk-low { color: #27AE60; }
</style>
</head>

const osColors = {
  'Linux': 'linux',
  'Windows': 'windows',
  'macOS': 'macos',
  'Android': 'android'
};

function classifyOs(wt) {
  if (wt.includes('linux') || wt.includes('kvm') || wt.includes('netperf')) return 'Linux';
  if (wt.includes('win')) return 'Windows';
  if (wt.includes('osx')) return 'macOS';
  if (wt.includes('bitbar') || wt.includes('lambda')) return 'Android';
  return 'Other';
}

function classifySuite(s) {
  if (s.startsWith('talos-') || s.startsWith('browsertime-')) return 'perf';
  if (s.startsWith('awsy')) return 'other';
  return 'func';
}

const workerTypes = data.worker_types;
const suites = data.suites;
const matrix = data.matrix;

// Group worker-types by OS
const osOrder = ['Linux', 'Windows', 'macOS', 'Android'];
const wtByOs = {};
osOrder.forEach(os => wtByOs[os] = []);
workerTypes.forEach((wt, idx) => {
  const os = classifyOs(wt);
  if (wtByOs[os]) wtByOs[os].push({name: wt, idx: idx});
});

// Ordered wt indices
const orderedWts = [];
osOrder.forEach(os => wtByOs[os].forEach(w => orderedWts.push(w)));

// Group suites by category
const suiteCats = {perf: [], func: [], other: []};
suites.forEach((s, i) => {
  const cat = classifySuite(s);
  const count = orderedWts.reduce((sum, w) => sum + matrix[i][w.idx], 0);
  suiteCats[cat].push({name: s, idx: i, count: count});
});

// Sort each category by count ascending (fewest coverage first = most at risk)
Object.values(suiteCats).forEach(arr => arr.sort((a, b) => a.count - b.count));

const table = document.getElementById('matrix');

// Build header rows
// OS group header
let osHeaderRow = '<tr><th class="suite-header"></th>';
osOrder.forEach(os => {
  const count = wtByOs[os].length;
  const color = os === 'Linux' ? '#4A90D9' : os === 'Windows' ? '#7B68EE' : os === 'macOS' ? '#E88D39' : '#50C878';
  osHeaderRow += `<th class="os-group-header" colspan="${count}" style="color:${color}; border-bottom-color:${color}">${os}</th>`;
});
osHeaderRow += '<th class="count-header">#</th></tr>';

// Worker-type header
let wtHeaderRow = '<tr><th class="suite-header" style="font-size:11px; color:#888;">Suite</th>';
orderedWts.forEach(w => {
  const os = classifyOs(w.name);
  const cls = osColors[os] || '';
  wtHeaderRow += `<th class="wt-header" style="color:${os === 'Linux' ? '#4A90D9' : os === 'Windows' ? '#7B68EE' : os === 'macOS' ? '#E88D39' : '#50C878'}">${w.name}</th>`;
});
wtHeaderRow += '<th class="count-header">#</th></tr>';

const thead = osHeaderRow + wtHeaderRow;

function riskClass(count) {
  if (count <= 1) return 'risk-high';
  if (count <= 3) return 'risk-med';
  return 'risk-low';
}

function buildSuiteRows(suiteList) {
  let html = '';
  suiteList.forEach(s => {
    html += '<tr>';
    html += `<td class="suite-name">${s.name}</td>`;
    orderedWts.forEach(w => {
      if (matrix[s.idx][w.idx]) {
        const os = classifyOs(w.name);
        const cls = osColors[os] || '';
        html += `<td><span class="dot ${cls}"></span></td>`;
      } else {
        html += `<td><span class="empty"></span></td>`;
      }
    });
    html += `<td class="count-cell ${riskClass(s.count)}">${s.count}</td>`;
    html += '</tr>';
  });
  return html;
}

function sectionRow(label, count) {
  const colspan = orderedWts.length + 2;
  return `<tr class="section-header"><td colspan="${colspan}">${label} (${count} suites)</td></tr>`;
}

let tbody = '';
tbody += sectionRow('Performance (Talos / Browsertime)', suiteCats.perf.length);
tbody += buildSuiteRows(suiteCats.perf);
tbody += sectionRow('Functional (Mochitest / WPT / xpcshell / etc)', suiteCats.func.length);
tbody += buildSuiteRows(suiteCats.func);
tbody += sectionRow('Other (AWSY)', suiteCats.other.length);
tbody += buildSuiteRows(suiteCats.other);

table.innerHTML = thead + tbody;
</script>
